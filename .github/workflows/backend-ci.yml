name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "ai/scripts/validate_project_contract.py"
      - "config/project_contract.json"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "ai/scripts/validate_project_contract.py"
      - "config/project_contract.json"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests and syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        run: >-
          python -m pip install
          --requirement backend/requirements-test.txt

      - name: Run backend unit tests
        env:
          PYTHONPATH: backend
        run: >-
          python -m unittest discover
          -s backend/tests
          -p "test_*.py"
          -v

      - name: Validate project contract
        run: >-
          python ai/scripts/validate_project_contract.py

      - name: Compile backend Python sources
        run: >-
          python -m compileall -q
          backend/app
          backend/tests
